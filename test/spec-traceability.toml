"09.err_stage_dup_name"     = ["spec/stages/invalid/stage_duplicate_name.topo"]
"09.err_cross_ns_undeclared"= ["spec/stages/invalid/cross_namespace_undeclared.topo"]
"09.err_type_mismatch"      = ["spec/pipeline/invalid/pipeline_type_mismatch.topo"]
