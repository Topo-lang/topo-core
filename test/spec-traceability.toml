# ============================================================================
# Debug declarations (Plan 40 Phase 0)
# `debug T { view ... summary ... inactive_region ... render ... }` produces
# metadata only — zero codegen impact. See
# `.aidesk/live/30-planning/40-topo-debug-profile-core.md` §2.1.
# ============================================================================
[debug]

"40.2.1_debug_decl"               = ["spec/debug/valid/basic_view_and_summary.topo"]
"40.2.1_view_decl_bare"           = ["spec/debug/valid/basic_view_and_summary.topo"]
"40.2.1_view_decl_sliced"         = ["spec/debug/valid/multi_view_with_slice.topo"]
"40.2.1_summary_decl"             = ["spec/debug/valid/basic_view_and_summary.topo"]
"40.2.1_inactive_decl"            = ["spec/debug/valid/inactive_region_grayed.topo"]
"40.2.1_err_unknown_target"       = ["spec/debug/invalid/unknown_target.topo"]
"40.2.1_err_malformed_slice"      = ["spec/debug/invalid/malformed_slice.topo"]
"40.2.1_err_missing_semicolon"    = ["spec/debug/invalid/missing_semicolon.topo"]
# `<RenderDeclRaw>` parses but web-rendering semantics are unimplemented;
# SemanticAnalyzer explicitly rejects it (no-silent-degradation).
"40.2.1_err_render_unimplemented" = ["spec/debug/invalid/render_unimplemented.topo"]
