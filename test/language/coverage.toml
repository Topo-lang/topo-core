# Topo Language Test Coverage Matrix
#
# Maps spec rules to test files. Each entry tracks which .topo test file(s)
# exercise a specific language rule from the spec documents.
#
# Usage: python scripts/test-coverage.py

[spec-07-syntax]
description = "Lexer and basic syntax rules"

[[spec-07-syntax.rules]]
id = "07.1"
description = "Comments (line and block)"
tests = ["syntax/valid/comments_everywhere.topo"]

[[spec-07-syntax.rules]]
id = "07.2"
description = "Namespace declarations"
tests = ["syntax/valid/empty_namespace.topo", "syntax/valid/nested_namespace.topo"]

[[spec-07-syntax.rules]]
id = "07.3"
description = "Unterminated string literal error"
tests = ["syntax/invalid/unterminated_string.topo"]

[[spec-07-syntax.rules]]
id = "07.4"
description = "Unterminated block comment error"
tests = ["syntax/invalid/unterminated_block_comment.topo"]

[[spec-07-syntax.rules]]
id = "07.5"
description = "Illegal character error"
tests = ["syntax/invalid/illegal_character.topo"]

[[spec-07-syntax.rules]]
id = "07.6"
description = "Unexpected token error"
tests = ["syntax/invalid/unexpected_token.topo"]

[[spec-07-syntax.rules]]
id = "07.7"
description = "Missing semicolon error"
tests = ["syntax/invalid/missing_semicolon.topo"]

[[spec-07-syntax.rules]]
id = "07.8"
description = "Unclosed namespace error"
tests = ["syntax/invalid/unclosed_namespace.topo"]

[[spec-07-syntax.rules]]
id = "07.9"
description = "Missing right parenthesis error"
tests = ["syntax/invalid/missing_rparen.topo"]

[[spec-07-syntax.rules]]
id = "07.10"
description = "Empty namespace error"
tests = ["syntax/invalid/empty_namespace.topo"]

