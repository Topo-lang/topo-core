[project]
name = "config_all_on"

[topo]
root = "topo/main.topo"

[build]
sources = ["src/main.cpp"]
standard = "c++17"
output = "config_all_on"
embed_ir = true

[parallel]
mode = "auto"
instrument = true

[lifetime]
mode = "auto"

[adaptive]
mode = "auto"

[optimize.indirection]
enabled = true

[loop_parallel]
enabled = true
